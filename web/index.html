<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>outwall</title>
    <!-- Anti-FOUC: paint the dark window background before the bundle loads, so
         the first frame is the app's charcoal surface rather than the webview's
         default white. outwall is dark-only in 6A (no theme toggle yet). This is
         an inline <style> (not <script>) so the production CSP can keep
         script-src 'self' — no inline scripts in the served document. -->
    <style>
      html {
        background-color: #1e1f22;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
